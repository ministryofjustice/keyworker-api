apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "app.fullname" . }}-keyworker-staff-role-sync
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            cron-job-name: keyworker-staff-role-sync-cron-job
        spec:
          containers:
            - name: keyworker-staff-role-sync
              image: ghcr.io/ministryofjustice/hmpps-devops-tools
              args:
                - /bin/sh
                - -c
                - curl --retry 2 -XPOST http://keyworker-api/staff/keyworker-roles/sync
          restartPolicy: Never
